<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BUILD DARTS | Official</title>
    <style>
        body {
            background-color: #0d0d0d; /* Глубокий черный цвет */
            color: #ff0000;            /* Фирменный красный */
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding-top: 80px;
            margin: 0;
        }

        /* Настройка твоего логотипа */
        .main-logo {
            width: 350px;              /* Размер логотипа */
            height: auto;
            /* Эффект свечения, как на твоих обоях */
            filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.6));
            margin-bottom: 30px;
            transition: 0.3s;          /* Плавность при наведении */
        }

        .main-logo:hover {
            transform: scale(1.05);    /* Логотип чуть увеличится при наведении */
            filter: drop-shadow(0 0 35px rgba(255, 0, 0, 0.9));
        }

        h1 {
            font-size: 3.5em;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin: 0;
        }

        p {
            color: #444;
            letter-spacing: 3px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <!-- ТВОЙ ФАЙЛ ЛОГОТИПА -->
    <img src="logo.png" alt="Build Darts Logo" class="main-logo">

    <h1>BUILD DARTS</h1>
    <p>SYSTEM LOADING...</p>

</body>
</html>
